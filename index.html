<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eternal Love - May-Tec Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
<style>
:root {
    --neon-red: #ff0033;
    --gold: #ffd700;
}
body, html {
    margin:0; padding:0;
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family: 'Montserrat', sans-serif;
}
canvas {
    display:block;
    position:fixed;
    top:0; left:0;
    z-index:1;
}
#ui-layer {
    position:relative;
    z-index:10;
    width:100%; height:100%;
    pointer-events:none;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* --- NUEVO ESTILO PARA LAS LÍNEAS QUE SUBEN CONTINUAMENTE --- */
.lyric-line {
    position: absolute;
    width: 100%;
    text-align: center;
    color: var(--gold);
    font-size: 2.5rem;
    font-weight: 700;
    text-shadow: 
        -2px -2px 0 #000,  
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0 0 15px rgba(0,0,0,1);
    
    /* Inician fuera de la pantalla (abajo) y usan una animación CSS */
    top: 100%;
    opacity: 0;
    animation: floatUpContinuous 16s linear forwards; /* 16 segundos subiendo lento y romántico */
}

/* Animación: Aparece desde abajo, sube constantemente y se desvanece al llegar arriba */
@keyframes floatUpContinuous {
    0%   { top: 100%; opacity: 0; }
    5%   { opacity: 1; } /* Aparece rápido al entrar desde abajo */
    85%  { opacity: 1; } /* Se mantiene visible casi todo el camino */
    100% { top: 0%; opacity: 0; } /* Se desvanece y desaparece justo en el borde superior */
}

#btn-start {
    pointer-events:auto;
    background: rgba(0,0,0,0.8);
    border:2px solid var(--neon-red);
    color:white;
    padding:18px 35px;
    font-size:1.2rem;
    border-radius:50px;
    cursor:pointer;
    transition:0.4s;
    text-transform:uppercase;
    letter-spacing:2px;
    box-shadow:0 0 15px var(--neon-red);
    z-index:20;
}
#btn-start:hover {
    background: var(--neon-red);
    transform: scale(1.1);
    box-shadow:0 0 40px var(--neon-red);
}
footer {
    position:fixed;
    bottom:20px;
    right:30px;
    z-index:25;
    color: rgba(255,255,255,0.6);
    font-family:'Courier New', monospace;
    letter-spacing:4px;
    font-size:0.8rem;
    text-shadow:0 0 8px var(--neon-red);
}
</style>
</head>
<body>

<canvas id="loveCanvas"></canvas>

<div id="ui-layer">
    <button id="btn-start">Nuestra Historia Comienza Aquí ❤️</button>
    </div>

<footer>MAY-TEC</footer>

<audio id="musica" src="cancion.mp3" loop></audio>

<script>
const canvas = document.getElementById('loveCanvas');
const ctx = canvas.getContext('2d');
const audio = document.getElementById('musica');
const uiLayer = document.getElementById('ui-layer');
const btn = document.getElementById('btn-start');

let width, height;
let hearts = [], stars = [], photos = [];
let isStarted = false;

// Letras ordenadas
const myLyrics = [
    { t: 13, m: "Si, tal vez, pudieras comprender" },
    { t: 17, m: "Que no sé como expresarme bien" },
    { t: 21, m: "Si, tal vez, pudiera hacerte ver" },
    { t: 25, m: "Que no hay otra mujer mejor que tu para mí" },
    { t: 29, m: "Si, tal vez, me harías muy feliz" },
    { t: 33, m: "Si, tal vez, me lo podrías decir" },
    { t: 37, m: "Si, tal vez, detalle a detalle" },
    { t: 41, m: "Podrías conquistarme sería tuya" },
    { t: 45, m: "Te quiero tanto, tanto, tanto, tanto, tanto" },
    { t: 49, m: "Cada día un poco más, ah ah" },
    { t: 53, m: "Te quiero tanto, tanto, tanto, tanto, tanto" },
    { t: 57, m: "Para mí no hay nadie igual, no lo hay" },
    { t: 61, m: "Te quiero tanto, tanto, tanto, tanto amor" },
    { t: 65, m: "Que ya no puedo más" },
    { t: 69, m: "Que ya no puedo más" },
    { t: 73, m: "Pues, tal vez, el mundo aprenderá" },
    { t: 77, m: "Con nuestro amor, lo bello que es amar" },
    { t: 81, m: "Y tal vez, lo vuelva a repetir" },
    { t: 85, m: "Pareja por pareja, el mundo entero al fin" },
    { t: 89, m: "Te quiero tanto, tanto, tanto, tanto, tanto" },
    { t: 93, m: "Cada día un poco más, ah ah" },
    { t: 97, m: "Te quiero tanto, tanto, tanto, tanto, tanto" },
    { t: 101, m: "Para mí no hay nadie igual, no lo hay" },
    { t: 105, m: "Te quiero tanto, tanto, tanto, tanto amor" },
    { t: 109, m: "Que ya no puedo más" },
    { t: 113, m: "Que ya no puedo más" },
    { t: 117, m: "Que ya no puedo más" },
    { t: 121, m: "Que ya no puedo más" }
];

let currentLyricIndex = 0; // Índice para llevar el control de qué frase toca

const imgPaths = ['foto1.jpg','foto2.jpg','foto3.jpg']; 
const loadedImgs = imgPaths.map(src => { const img = new Image(); img.src = src; return img; });

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Star {
    constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 2;
        this.blink = 0.05 + Math.random()*0.1;
        this.opacity = Math.random();
    }
    draw() {
        this.opacity += this.blink;
        if(this.opacity>1 || this.opacity<0) this.blink*=-1;
        ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.fillRect(this.x,this.y,this.size,this.size);
    }
}

class Heart {
    constructor(isMain=false) {
        this.isMain = isMain;
        this.init();
    }
    init() {
        this.x = Math.random()*width;
        this.y = height + Math.random()*500;
        this.size = this.isMain ? Math.random()*20+15 : Math.random()*4+2;
        this.speed = Math.random()*1.5+0.5;
        this.angle = Math.random()*Math.PI*2;
        this.opacity = Math.random()*0.7+0.3;
    }
    draw() {
        this.y -= this.speed;
        this.angle += 0.01;
        let xOffset = Math.sin(this.angle)*10;
        ctx.save();
        ctx.translate(this.x + xOffset, this.y);
        ctx.beginPath();
        for(let i=0;i<Math.PI*2;i+=0.1){
            let r = this.size;
            let dx = 16*Math.pow(Math.sin(i),3);
            let dy = -(13*Math.cos(i)-5*Math.cos(2*i)-2*Math.cos(3*i)-Math.cos(4*i));
            ctx.lineTo(dx*(r/15),dy*(r/15));
        }
        ctx.fillStyle = `rgba(255, ${this.isMain?'0,51':'182,193'}, ${this.opacity})`;
        if(this.isMain){ ctx.shadowBlur=12; ctx.shadowColor="red";}
        ctx.fill();
        ctx.restore();
        if(this.y<-50) this.init();
    }
}

class Photo {
    constructor(img){
        this.img = img;
        this.reset();
    }
    reset(){
        this.x = Math.random()*(width-200)+100;
        this.y = height + 200 + Math.random()*300;
        this.size = 120 + Math.random()*80;
        this.speed = 0.7 + Math.random()*1.2;
        this.angle = (Math.random()-0.5)*0.2;
        this.opacity = 0;
    }
    draw(){
        this.y -= this.speed;
        if(this.opacity<1) this.opacity+=0.01;
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.translate(this.x,this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle="white";
        ctx.fillRect(-this.size/2-8,-this.size/2-8,this.size+16,this.size+32);
        try{ctx.drawImage(this.img,-this.size/2,-this.size/2,this.size,this.size);}catch(e){}
        ctx.restore();
        if(this.y<-300) this.reset();
    }
}

for(let i=0;i<800;i++) stars.push(new Star());
for(let i=0;i<400;i++) hearts.push(new Heart(i%10===0));
loadedImgs.forEach(img=>{for(let j=0;j<3;j++) photos.push(new Photo(img));});

// --- NUEVO SISTEMA DE LETRAS ---
// Genera elementos HTML que flotan hacia arriba
function spawnLyric(text) {
    const el = document.createElement('div');
    el.className = 'lyric-line';
    el.innerText = text;
    uiLayer.appendChild(el);

    // Limpia el elemento después de 16 segundos (lo que dura su animación) para no saturar la memoria
    setTimeout(() => {
        if (el.parentNode) {
            el.parentNode.removeChild(el);
        }
    }, 16000); 
}

function checkLyrics() {
    if (!isStarted) return;
    let curr = audio.currentTime;
    
    // Si todavía quedan frases por mostrar y llegamos al segundo de la siguiente frase
    if (currentLyricIndex < myLyrics.length && curr >= myLyrics[currentLyricIndex].t) {
        spawnLyric(myLyrics[currentLyricIndex].m);
        currentLyricIndex++; // Avanzamos a la siguiente frase
    }
}

function animate(){
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.fillRect(0,0,width,height);
    stars.forEach(s=>s.draw());
    
    if(isStarted){
        photos.forEach(p=>p.draw());
        hearts.forEach(h=>h.draw());
        checkLyrics(); // Verificamos si toca disparar una nueva frase
    }
    
    requestAnimationFrame(animate);
}

btn.addEventListener('click',()=>{
    audio.play();
    isStarted=true;
    btn.style.display='none';
});

animate();
</script>
</body>
</html>
